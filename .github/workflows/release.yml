name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            executable_name: ReportGeneratorPro-Linux
            artifact_name: ReportGeneratorPro
            icon: assets/icon.png
            sep: ":"
          - os: windows-latest
            executable_name: ReportGeneratorPro-Windows.exe
            artifact_name: ReportGeneratorPro.exe
            icon: assets/icon.ico
            sep: ";"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      # Qt requires some core libraries to compile cleanly on Linux runners
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller jinja2

    - name: Build Application
      # --add-data dynamically uses ":" for Linux and ";" for Windows
      run: pyinstaller --onefile --windowed --icon="${{ matrix.icon }}" --add-data "assets${{ matrix.sep }}assets" --name "ReportGeneratorPro" src/main.py

    - name: Rename Artifacts
      shell: bash
      run: |
        mv "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.executable_name }}"

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.executable_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}